# Used by docker-compose: mounted as /etc/nginx/nginx.conf
# Access logs omit the query string (see log_format vox_noquery) so WebSocket
# URLs like /v1/ws?access_token=... do not leak tokens into logs.

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Docker's embedded DNS (see /etc/resolv.conf in the container). Resolving the
    # vox-server hostname at request time avoids "host not found in upstream" on
    # `nginx -s reload` when static `upstream { server vox-server:8080; }` is used.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Like "combined", but logs "$method $uri $protocol" instead of $request (no ?query).
    log_format vox_noquery '$remote_addr - $remote_user [$time_local] '
        '"$request_method $uri $server_protocol" $status $body_bytes_sent '
        '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log vox_noquery;

    sendfile on;
    keepalive_timeout 65;

    include /etc/nginx/conf.d/*.conf;
}
