# Public hostname (edit if you use another domain)
# Backend address is passed via $vox_upstream so nginx resolves vox-server at request
# time (resolver in nginx.conf), not when the config is loaded — avoids reload failures.

server {
    listen 80;
    listen [::]:80;
    server_name messenger.bialger.com;

    client_max_body_size 100m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        set $vox_upstream vox-server;
        proxy_pass http://$vox_upstream:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
