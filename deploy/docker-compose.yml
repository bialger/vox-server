services:
  vox-server:
    # Production: set VOX_IMAGE in deploy/.env (ghcr.io/owner/repo:<sha>). Local: omit and use docker-compose.build.yml.
    image: ${VOX_IMAGE:-vox-server:local}
    pull_policy: always
    restart: unless-stopped
    volumes:
      - vox_data:/data
      - ./vox.conf:/etc/vox.conf:ro
    environment:
      VOX_SESSION_PEPPER: ${VOX_SESSION_PEPPER:?set VOX_SESSION_PEPPER in .env}
      VOX_ADMIN_TOKEN: ${VOX_ADMIN_TOKEN:-}
    expose:
      - "8080"
    networks:
      - vox_net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt:ro
    depends_on:
      - vox-server
    networks:
      - vox_net

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    # Obtain cert (run once from host, see README):
    # docker compose run --rm certbot certonly --webroot -w /var/www/certbot \
    #   -d messenger.bialger.com --email YOUR@EMAIL --agree-tos --non-interactive
    profiles:
      - certbot

volumes:
  vox_data:
  certbot-www:
  certbot-conf:

networks:
  vox_net:
    driver: bridge
