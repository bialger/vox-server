# Single vox-server instance only: SQLite uses one writable file; do not `scale` this service.
services:
  vox-server:
    # Production: set VOX_IMAGE in deploy/.env (ghcr.io/owner/repo:<sha>). Local: omit and use docker-compose.build.yml.
    image: ${VOX_IMAGE:-vox-server:local}
    pull_policy: always
    restart: unless-stopped
    volumes:
      - vox_data:/data
      - ./vox.conf:/etc/vox.conf:ro
    environment:
      VOX_SESSION_PEPPER: ${VOX_SESSION_PEPPER:?set VOX_SESSION_PEPPER in .env}
      VOX_ADMIN_TOKEN: ${VOX_ADMIN_TOKEN:-}
    expose:
      - "8080"
    # HTTP probe: image must include curl (see Dockerfile.prebuilt).
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 120s
    networks:
      - vox_net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt:ro
    depends_on:
      vox-server:
        condition: service_healthy
    # Probe through nginx so mis-proxy / upstream issues surface (busybox wget; Host matches server_name in conf.d).
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null --header='Host: messenger.bialger.com' http://127.0.0.1/v1/health || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - vox_net

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    # Obtain cert (run once from host, see README):
    # docker compose run --rm certbot certonly --webroot -w /var/www/certbot \
    #   -d messenger.bialger.com --email YOUR@EMAIL --agree-tos --non-interactive
    profiles:
      - certbot

volumes:
  vox_data:
  certbot-www:
  certbot-conf:

networks:
  vox_net:
    driver: bridge
