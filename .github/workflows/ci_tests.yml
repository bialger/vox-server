name: "CI tests"

# Push only: one full CI run per push (no duplicate pull_request).
on:
  push:

# upload-artifact in reusable workflow needs actions:write; default token is often read-only.
permissions:
  contents: read
  actions: write
  packages: write

jobs:
  ci:
    uses: ./.github/workflows/ci-reusable.yml
    secrets: inherit

  # Build image on GitHub-hosted runner, push to GHCR (no compile on the VPS).
  docker-publish:
    name: Build and push image (GHCR)
    runs-on: ubuntu-latest
    needs: [ci]
    # Avoid success(): with reusable workflows it can mis-report; use explicit needs result.
    if: |
      needs.ci.result == 'success' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master'
    permissions:
      contents: read
      actions: read
      packages: write
    concurrency:
      # Do not share queue with "Deploy PR branch" (same name caused stuck/cancel behaviour).
      group: docker-publish-${{ github.workflow }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Download vox-server from CI (Ubuntu matrix)
        uses: actions/download-artifact@v4
        with:
          name: vox-server-linux
          path: docker-build-context
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ github.run_id }}

      - name: Prepare Docker build context
        run: cp deploy/docker-entrypoint.sh docker-build-context/docker-entrypoint.sh

      - name: Image name (lowercase for GHCR)
        id: meta
        run: |
          echo "repository_lower=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (prebuilt binary, image tagged with commit SHA)
        uses: docker/build-push-action@v6
        with:
          context: docker-build-context
          file: ./deploy/Dockerfile.prebuilt
          push: true
          tags: ghcr.io/${{ steps.meta.outputs.repository_lower }}:${{ github.sha }}

      - name: Tag latest
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker pull "ghcr.io/${{ steps.meta.outputs.repository_lower }}:${{ github.sha }}"
          docker tag "ghcr.io/${{ steps.meta.outputs.repository_lower }}:${{ github.sha }}" \
            "ghcr.io/${{ steps.meta.outputs.repository_lower }}:latest"
          docker push "ghcr.io/${{ steps.meta.outputs.repository_lower }}:latest"

  # Pull prebuilt image on the server (git pull only updates nginx/compose; app comes from GHCR).
  deploy-server:
    name: Deploy (pull image + compose up)
    runs-on: ubuntu-latest
    needs: [docker-publish]
    if: |
      needs.docker-publish.result == 'success' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master'
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
        with:
          host: messenger.bialger.com
          username: ${{ secrets.SERVER_LOGIN }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          command_timeout: 30m
          envs: GHCR_READ_TOKEN,GHCR_USERNAME,GITHUB_REPO_OWNER
          script_stop: true
          script: |
            set -euo pipefail
            BRANCH="${{ github.ref_name }}"
            REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            IMAGE="ghcr.io/${REPO_LC}:${{ github.sha }}"
            cd /opt/vox-server
            git fetch origin "${BRANCH}"
            git checkout "${BRANCH}"
            git pull --ff-only origin "${BRANCH}"
            cd deploy
            if [ ! -f .env ]; then
              printf '%s\n' "VOX_IMAGE=${IMAGE}" > .env
            elif grep -q '^VOX_IMAGE=' .env 2>/dev/null; then
              grep -v '^VOX_IMAGE=' .env > .env.tmp
              mv .env.tmp .env
              printf '%s\n' "VOX_IMAGE=${IMAGE}" >> .env
            else
              printf '%s\n' "VOX_IMAGE=${IMAGE}" >> .env
            fi
            if [ -n "${GHCR_READ_TOKEN:-}" ]; then
              U="${GHCR_USERNAME:-${GITHUB_REPO_OWNER}}"
              echo "${GHCR_READ_TOKEN}" | docker login ghcr.io -u "${U}" --password-stdin
            fi
            docker compose pull vox-server
            docker compose up -d
