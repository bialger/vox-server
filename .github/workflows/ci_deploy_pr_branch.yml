# Same-repo PR branch: CI runs on push (ci_tests.yml). Deploy after that run if an open PR targets master.
name: "Deploy PR branch"

on:
  workflow_run:
    workflows: ["CI tests"]
    types: [completed]

jobs:
  docker-publish:
    name: Build and push image (GHCR)
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch != 'master'
    permissions:
      contents: read
      actions: read
      packages: write
      pull-requests: read
    concurrency:
      group: docker-publish
      cancel-in-progress: false
    outputs:
      deploy: ${{ steps.check.outputs.deploy }}
      sha: ${{ steps.check.outputs.sha }}
      branch: ${{ steps.check.outputs.branch }}
    steps:
      - name: Open PR to master?
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const head = run.head_branch;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const { data: prs } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              base: 'master',
              head: `${owner}:${head}`,
            });
            if (prs.length === 0) {
              core.setOutput('deploy', 'false');
              core.setOutput('sha', '');
              core.setOutput('branch', '');
            } else {
              core.setOutput('deploy', 'true');
              core.setOutput('sha', run.head_sha);
              core.setOutput('branch', head);
            }

      - name: Skip (no PR to master)
        if: steps.check.outputs.deploy != 'true'
        run: echo "No open PR from this branch to master; skipping image and deploy."

      - uses: actions/checkout@v4
        if: steps.check.outputs.deploy == 'true'
        with:
          ref: ${{ steps.check.outputs.sha }}

      - name: Download vox-server from triggering CI run
        if: steps.check.outputs.deploy == 'true'
        uses: actions/download-artifact@v4
        with:
          name: vox-server-linux
          path: docker-build-context
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Prepare Docker build context
        if: steps.check.outputs.deploy == 'true'
        run: cp deploy/docker-entrypoint.sh docker-build-context/docker-entrypoint.sh

      - name: Image name (lowercase for GHCR)
        id: meta
        if: steps.check.outputs.deploy == 'true'
        run: |
          echo "repository_lower=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        if: steps.check.outputs.deploy == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (prebuilt binary, image tagged with commit SHA)
        if: steps.check.outputs.deploy == 'true'
        uses: docker/build-push-action@v6
        with:
          context: docker-build-context
          file: ./deploy/Dockerfile.prebuilt
          push: true
          tags: ghcr.io/${{ steps.meta.outputs.repository_lower }}:${{ steps.check.outputs.sha }}

      - name: Tag latest
        if: steps.check.outputs.deploy == 'true'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker pull "ghcr.io/${{ steps.meta.outputs.repository_lower }}:${{ steps.check.outputs.sha }}"
          docker tag "ghcr.io/${{ steps.meta.outputs.repository_lower }}:${{ steps.check.outputs.sha }}" \
            "ghcr.io/${{ steps.meta.outputs.repository_lower }}:latest"
          docker push "ghcr.io/${{ steps.meta.outputs.repository_lower }}:latest"

  deploy-server:
    name: Deploy (pull image + compose up)
    runs-on: ubuntu-latest
    needs: [docker-publish]
    if: >
      needs.docker-publish.result == 'success' &&
      needs.docker-publish.outputs.deploy == 'true'
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
        with:
          host: messenger.bialger.com
          username: ${{ secrets.SERVER_LOGIN }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          command_timeout: 30m
          envs: GHCR_READ_TOKEN,GHCR_USERNAME,GITHUB_REPO_OWNER
          script_stop: true
          script: |
            set -euo pipefail
            BRANCH="${{ needs.docker-publish.outputs.branch }}"
            REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            SHA="${{ needs.docker-publish.outputs.sha }}"
            IMAGE="ghcr.io/${REPO_LC}:${SHA}"
            cd /opt/vox-server
            git fetch origin "${BRANCH}"
            git checkout "${BRANCH}"
            git pull --ff-only origin "${BRANCH}"
            cd deploy
            if [ ! -f .env ]; then
              printf '%s\n' "VOX_IMAGE=${IMAGE}" > .env
            elif grep -q '^VOX_IMAGE=' .env 2>/dev/null; then
              grep -v '^VOX_IMAGE=' .env > .env.tmp
              mv .env.tmp .env
              printf '%s\n' "VOX_IMAGE=${IMAGE}" >> .env
            else
              printf '%s\n' "VOX_IMAGE=${IMAGE}" >> .env
            fi
            if [ -n "${GHCR_READ_TOKEN:-}" ]; then
              U="${GHCR_USERNAME:-${GITHUB_REPO_OWNER}}"
              echo "${GHCR_READ_TOKEN}" | docker login ghcr.io -u "${U}" --password-stdin
            fi
            docker compose pull vox-server
            docker compose up -d
