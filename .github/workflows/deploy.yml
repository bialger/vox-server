name: Deploy (Docker)

on:
  workflow_dispatch:
    inputs:
      server_host:
        description: "SSH host (DNS name or IP)"
        required: true
        default: "messenger.bialger.com"
      deploy_path:
        description: "Absolute path to this repository on the server"
        required: true
        default: "/opt/vox-server"
      branch:
        description: "Git branch to checkout (deploy configs/nginx from this ref)"
        required: true
        default: "main"
      image_tag:
        description: "GHCR image tag (use commit SHA from the workflow run that built the image, or latest on main)"
        required: true
        default: "latest"

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (git pull + pull image + compose up)
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
        with:
          host: ${{ github.event.inputs.server_host }}
          username: ${{ secrets.SERVER_LOGIN }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          command_timeout: 30m
          envs: GHCR_READ_TOKEN,GHCR_USERNAME,GITHUB_REPO_OWNER
          script_stop: true
          script: |
            set -euo pipefail
            REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            IMAGE="ghcr.io/${REPO_LC}:${{ github.event.inputs.image_tag }}"
            cd "${{ github.event.inputs.deploy_path }}"
            git fetch origin "${{ github.event.inputs.branch }}"
            git checkout "${{ github.event.inputs.branch }}"
            git pull --ff-only origin "${{ github.event.inputs.branch }}"
            cd deploy
            if [ ! -f .env ]; then
              printf '%s\n' "VOX_IMAGE=${IMAGE}" > .env
            elif grep -q '^VOX_IMAGE=' .env 2>/dev/null; then
              grep -v '^VOX_IMAGE=' .env > .env.tmp
              mv .env.tmp .env
              printf '%s\n' "VOX_IMAGE=${IMAGE}" >> .env
            else
              printf '%s\n' "VOX_IMAGE=${IMAGE}" >> .env
            fi
            if [ -n "${GHCR_READ_TOKEN:-}" ]; then
              U="${GHCR_USERNAME:-${GITHUB_REPO_OWNER}}"
              echo "${GHCR_READ_TOKEN}" | docker login ghcr.io -u "${U}" --password-stdin
            fi
            docker compose pull vox-server
            docker compose up -d
