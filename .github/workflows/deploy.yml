name: Deploy (Docker)

on:
  workflow_dispatch:
    inputs:
      server_host:
        description: "SSH host (DNS name or IP — same machine as messenger.bialger.com or a bastion)"
        required: true
        default: "messenger.bialger.com"
      deploy_path:
        description: "Absolute path to this repository on the server"
        required: true
        default: "/opt/vox-server"
      branch:
        description: "Git branch to checkout and deploy"
        required: true
        default: "main"

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (git pull + docker compose)
        uses: appleboy/ssh-action@v1.2.0
        env:
          VOX_ADMIN_TOKEN: ${{ secrets.VOX_ADMIN_TOKEN }}
        with:
          host: ${{ github.event.inputs.server_host }}
          username: ${{ secrets.SERVER_LOGIN }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          command_timeout: 45m
          envs: VOX_ADMIN_TOKEN
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ github.event.inputs.deploy_path }}"
            git fetch origin "${{ github.event.inputs.branch }}"
            git checkout "${{ github.event.inputs.branch }}"
            git pull --ff-only origin "${{ github.event.inputs.branch }}"
            cd deploy
            export VOX_ADMIN_TOKEN="${VOX_ADMIN_TOKEN:-}"
            docker compose build
            docker compose up -d
